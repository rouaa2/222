<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工程用計算機 - rouaa老師</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: url('./assets/bg.jpg') repeat;
            background-size: 300px;
            font-family: 'Georgia', 'Garamond', 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .calculator-container {
            background: rgba(255, 255, 255, 0.9);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 5px solid #558b2f;
            backdrop-filter: blur(5px);
            width: 100%;
            max-width: 384px;
            transform: scale(0.8);
            transform-origin: top center;
        }

        .title {
            text-align: center;
            color: #33691e;
            font-size: 19px;
            margin-bottom: 16px;
            font-weight: bold;
        }

        .display {
            width: 100%;
            height: 64px;
            font-size: 32px;
            padding: 12px;
            margin-bottom: 20px;
            border: 3px solid #7cb342;
            border-radius: 8px;
            text-align: right;
            background-color: #f1f8f1;
            color: #33691e;
            outline: none;
            font-family: 'Georgia', serif;
            box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .mode-toggle {
            text-align: center;
            margin-bottom: 15px;
        }

        .mode-toggle button {
            background: linear-gradient(135deg, #9ccc65 0%, #7cb342 100%);
            border: 2px solid #558b2f;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.15s;
            box-shadow: 0 3px 0 #558b2f;
            font-family: 'Georgia', serif;
        }

        .mode-toggle button:hover {
            background: linear-gradient(135deg, #7cb342 0%, #558b2f 100%);
        }

        .mode-toggle button:active {
            box-shadow: 0 2px 0 #558b2f;
            transform: translateY(2px);
        }

        .button-grid {
            display: grid;
            gap: 6px;
            margin-bottom: 12px;
        }

        .basic-grid {
            grid-template-columns: repeat(4, 1fr);
        }

        .scientific-grid {
            grid-template-columns: repeat(5, 1fr);
        }

        .button {
            width: 48px;
            height: 48px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50%;
            border: 2px solid #558b2f;
            background: linear-gradient(135deg, #9ccc65 0%, #7cb342 100%);
            color: #fff;
            transition: all 0.15s;
            box-shadow: 0 4px 0 #558b2f, inset 0 1px 0 rgba(255,255,255,0.3);
            outline: none;
            font-family: 'Georgia', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .button:hover {
            background: linear-gradient(135deg, #7cb342 0%, #558b2f 100%);
            transform: translateY(-2px);
        }

        .button:active {
            box-shadow: 0 2px 0 #558b2f, inset 0 1px 0 rgba(255,255,255,0.3);
            transform: translateY(3px);
        }

        /* 運算符號按鈕 */
        .operator {
            background: linear-gradient(135deg, #8bc34a 0%, #689f38 100%);
            border-color: #33691e;
            box-shadow: 0 5px 0 #33691e, inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .operator:hover {
            background: linear-gradient(135deg, #689f38 0%, #33691e 100%);
        }

        /* 等號按鈕 */
        .equals {
            background: linear-gradient(135deg, #7cb342 0%, #558b2f 100%);
            border-color: #33691e;
            box-shadow: 0 4px 0 #33691e, inset 0 1px 0 rgba(255,255,255,0.3);
            grid-column: span 2;
            width: auto;
            border-radius: 8px;
        }

        .equals:hover {
            background: linear-gradient(135deg, #558b2f 0%, #33691e 100%);
        }

        /* 清除與退格按鈕 */
        .clear {
            background: linear-gradient(135deg, #ff8a65 0%, #e64a19 100%);
            border-color: #bf360c;
            box-shadow: 0 4px 0 #bf360c, inset 0 1px 0 rgba(255,255,255,0.3);
            width: auto;
            border-radius: 8px;
        }

        .clear:hover {
            background: linear-gradient(135deg, #e64a19 0%, #bf360c 100%);
        }

        /* 科學函數按鈕 */
        .scientific-func {
            background: linear-gradient(135deg, #64b5f6 0%, #1976d2 100%);
            border-color: #0d47a1;
            box-shadow: 0 4px 0 #0d47a1, inset 0 1px 0 rgba(255,255,255,0.3);
            font-size: 13px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            padding: 0;
        }

        .scientific-func:hover {
            background: linear-gradient(135deg, #1976d2 0%, #0d47a1 100%);
        }

        /* 隱藏科學模式 */
        .scientific-panel {
            display: none;
        }

        .scientific-panel.active {
            display: block;
        }

        .basic-panel.hidden {
            display: none;
        }

        /* 控制按鈕行 */
        .control-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="title">工程用計算機</div>
        
        <div class="mode-toggle">
            <button onclick="toggleMode()">切換到科學模式</button>
        </div>

        <input type="text" id="display" class="display" readonly>

        <!-- 基礎計算機 -->
        <div id="basicPanel" class="basic-panel">
            <div class="button-grid basic-grid">
                <button class="button" onclick="appendToDisplay('7')">7</button>
                <button class="button" onclick="appendToDisplay('8')">8</button>
                <button class="button" onclick="appendToDisplay('9')">9</button>
                <button class="button operator" onclick="appendToDisplay('/')">÷</button>

                <button class="button" onclick="appendToDisplay('4')">4</button>
                <button class="button" onclick="appendToDisplay('5')">5</button>
                <button class="button" onclick="appendToDisplay('6')">6</button>
                <button class="button operator" onclick="appendToDisplay('*')">×</button>

                <button class="button" onclick="appendToDisplay('1')">1</button>
                <button class="button" onclick="appendToDisplay('2')">2</button>
                <button class="button" onclick="appendToDisplay('3')">3</button>
                <button class="button operator" onclick="appendToDisplay('-')">−</button>

                <button class="button" onclick="appendToDisplay('0')">0</button>
                <button class="button" onclick="appendToDisplay('.')">.</button>
                <button class="button equals" onclick="calculate()">=</button>
                <button class="button operator" onclick="appendToDisplay('+')">+</button>
            </div>

            <div class="control-row">
                <button class="button clear" onclick="clearDisplay()">清除 (C)</button>
                <button class="button clear" onclick="backspace()">退格 (←)</button>
            </div>
        </div>

        <!-- 科學計算機 -->
        <div id="scientificPanel" class="scientific-panel">
            <div class="button-grid scientific-grid">
                <!-- 第一行：科學函數 -->
                <button class="button scientific-func" onclick="appendToDisplay('sin(')">sin</button>
                <button class="button scientific-func" onclick="appendToDisplay('cos(')">cos</button>
                <button class="button scientific-func" onclick="appendToDisplay('tan(')">tan</button>
                <button class="button scientific-func" onclick="appendToDisplay('log(')">log</button>
                <button class="button scientific-func" onclick="appendToDisplay('ln(')">ln</button>

                <!-- 第二行：常數與進階運算 -->
                <button class="button scientific-func" onclick="appendToDisplay('3.14159265359')">π</button>
                <button class="button scientific-func" onclick="appendToDisplay('2.71828182846')">e</button>
                <button class="button scientific-func" onclick="appendToDisplay('sqrt(')">√</button>
                <button class="button operator" onclick="appendToDisplay('^')">^</button>
                <button class="button scientific-func" onclick="appendToDisplay('!')">!</button>

                <!-- 第三行：數字與括號 -->
                <button class="button" onclick="appendToDisplay('7')">7</button>
                <button class="button" onclick="appendToDisplay('8')">8</button>
                <button class="button" onclick="appendToDisplay('9')">9</button>
                <button class="button operator" onclick="appendToDisplay('/')" style="grid-column: span 2;">÷</button>

                <!-- 第四行：數字與運算 -->
                <button class="button" onclick="appendToDisplay('4')">4</button>
                <button class="button" onclick="appendToDisplay('5')">5</button>
                <button class="button" onclick="appendToDisplay('6')">6</button>
                <button class="button operator" onclick="appendToDisplay('*')" style="grid-column: span 2;">×</button>

                <!-- 第五行：數字與運算 -->
                <button class="button" onclick="appendToDisplay('1')">1</button>
                <button class="button" onclick="appendToDisplay('2')">2</button>
                <button class="button" onclick="appendToDisplay('3')">3</button>
                <button class="button operator" onclick="appendToDisplay('-')" style="grid-column: span 2;">−</button>

                <!-- 第六行：數字與小數 -->
                <button class="button" onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
                <button class="button" onclick="appendToDisplay('.')">.</button>
                <button class="button operator" onclick="appendToDisplay('+')" style="grid-column: span 2;">+</button>

                <!-- 第七行：括號 -->
                <button class="button scientific-func" onclick="appendToDisplay('(')">(</button>
                <button class="button scientific-func" onclick="appendToDisplay(')')">)</button>
                <button class="button operator" onclick="appendToDisplay('%')">%</button>
                <button class="button equals" onclick="calculate()" style="grid-column: span 2;">=</button>
            </div>

            <div class="control-row">
                <button class="button clear" onclick="clearDisplay()">清除 (C)</button>
                <button class="button clear" onclick="backspace()">退格 (←)</button>
            </div>
        </div>
    </div>

    <script>
        let isScientificMode = false;

        function toggleMode() {
            isScientificMode = !isScientificMode;
            const basicPanel = document.getElementById('basicPanel');
            const scientificPanel = document.getElementById('scientificPanel');
            const button = document.querySelector('.mode-toggle button');

            if (isScientificMode) {
                basicPanel.classList.add('hidden');
                scientificPanel.classList.add('active');
                button.textContent = '切換到基礎模式';
            } else {
                basicPanel.classList.remove('hidden');
                scientificPanel.classList.remove('active');
                button.textContent = '切換到科學模式';
            }
        }

        function appendToDisplay(value) {
            document.getElementById("display").value += value;
        }

        function clearDisplay() {
            document.getElementById("display").value = '';
        }

        function backspace() {
            const display = document.getElementById("display");
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            const display = document.getElementById("display");
            const expression = display.value;

            try {
                const result = evaluateMathExpression(expression);
                display.value = result;
            } catch (e) {
                display.value = 'Error';
            }
        }

        function evaluateMathExpression(expr) {
            // 替換數學函數
            expr = expr.replace(/sin\(/g, 'Math.sin(');
            expr = expr.replace(/cos\(/g, 'Math.cos(');
            expr = expr.replace(/tan\(/g, 'Math.tan(');
            expr = expr.replace(/log\(/g, 'Math.log10(');
            expr = expr.replace(/ln\(/g, 'Math.log(');
            expr = expr.replace(/sqrt\(/g, 'Math.sqrt(');
            expr = expr.replace(/\^/g, '**');
            
            // 處理階乘
            expr = expr.replace(/(\d+)!/g, (match, num) => {
                return factorial(parseInt(num));
            });

            // 將角度轉換為弧度（假設輸入為度數）
            expr = expr.replace(/Math\.(sin|cos|tan)\(([\d.]+)\)/g, (match, func, angle) => {
                const radian = parseFloat(angle) * Math.PI / 180;
                return `Math.${func}(${radian})`;
            });

            // 安全評估
            if (/^[0-9+\-*/().^%\s]*$/.test(expr.replace(/Math\.\w+/g, ''))) {
                return eval(expr);
            } else {
                throw new Error('Invalid expression');
            }
        }

        function factorial(n) {
            if (n < 0) return NaN;
            if (n === 0 || n === 1) return 1;
            let result = 1;
            for (let i = 2; i <= n; i++) {
                result *= i;
            }
            return result;
        }
    </script>
</body>
</html>
