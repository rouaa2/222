<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古典風格計算機 - rouaa老師</title>
    <style>
        body {
            background: url('./assets/bg.jpg') repeat;
            background-size: 300px;
            font-family: 'Georgia', 'Garamond', 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .calculator-container {
            background: rgba(255, 255, 255, 0.85);
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border: 6px solid #558b2f;
            backdrop-filter: blur(5px);
        }

        input[type="text"] {
            width: 360px;
            height: 80px;
            font-size: 40px;
            padding: 15px;
            margin-bottom: 25px;
            border: 4px solid #7cb342;
            border-radius: 10px;
            text-align: right;
            background-color: #f1f8f1;
            color: #33691e;
            box-sizing: border-box;
            outline: none;
            font-family: 'Georgia', serif;
            box-shadow: inset 0 3px 10px rgba(0, 0, 0, 0.1);
        }

        .button-row {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        input[type="button"] {
            width: 85px;
            height: 85px;
            font-size: 30px;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
            border-radius: 12px;
            border: 4px solid #558b2f;
            background: linear-gradient(135deg, #9ccc65 0%, #7cb342 100%);
            color: #fff;
            transition: all 0.15s;
            box-shadow: 0 6px 0 #558b2f, inset 0 1px 0 rgba(255,255,255,0.3);
            outline: none;
            font-family: 'Georgia', serif;
        }

        input[type="button"]:hover {
            background: linear-gradient(135deg, #7cb342 0%, #558b2f 100%);
            transform: translateY(-2px);
        }

        input[type="button"]:active {
            box-shadow: 0 2px 0 #558b2f, inset 0 1px 0 rgba(255,255,255,0.3);
            transform: translateY(4px);
        }

        /* 運算符號按鈕特殊樣式 */
        input[type="button"][value="+"],
        input[type="button"][value="-"],
        input[type="button"][value="*"],
        input[type="button"][value="/"] {
            background: linear-gradient(135deg, #8bc34a 0%, #689f38 100%);
            border-color: #33691e;
            box-shadow: 0 6px 0 #33691e, inset 0 1px 0 rgba(255,255,255,0.3);
        }

        input[type="button"][value="="] {
            background: linear-gradient(135deg, #7cb342 0%, #558b2f 100%);
            border-color: #33691e;
            box-shadow: 0 6px 0 #33691e, inset 0 1px 0 rgba(255,255,255,0.3);
        }

        input[type="button"][value="C"] {
            background: linear-gradient(135deg, #ff8a65 0%, #e64a19 100%);
            border-color: #bf360c;
            box-shadow: 0 6px 0 #bf360c, inset 0 1px 0 rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <input type="text" id="display" readonly>
        <div class="button-row">
            <input type="button" value="1" onclick="appendToDisplay('1')">
            <input type="button" value="2" onclick="appendToDisplay('2')">
            <input type="button" value="3" onclick="appendToDisplay('3')">
            <input type="button" value="+" onclick="appendToDisplay('+')">
        </div>
        <div class="button-row">
            <input type="button" value="4" onclick="appendToDisplay('4')">
            <input type="button" value="5" onclick="appendToDisplay('5')">
            <input type="button" value="6" onclick="appendToDisplay('6')">
            <input type="button" value="-" onclick="appendToDisplay('-')">
        </div>
        <div class="button-row">
            <input type="button" value="7" onclick="appendToDisplay('7')">
            <input type="button" value="8" onclick="appendToDisplay('8')">
            <input type="button" value="9" onclick="appendToDisplay('9')">
            <input type="button" value="*" onclick="appendToDisplay('*')">
        </div>
        <div class="button-row">
            <input type="button" value="0" onclick="appendToDisplay('0')">
            <input type="button" value="C" onclick="clearDisplay()">
            <input type="button" value="=" onclick="calculate()">
            <input type="button" value="/" onclick="appendToDisplay('/')">
        </div>
    </div>
    <script>
        function appendToDisplay(value) {
            document.getElementById("display").value += value;
        }

        function clearDisplay() {
            document.getElementById("display").value = '';
        }

        function calculate() {
            var expression = document.getElementById("display").value;
            try {
                // 使用簡單的正則表達式過濾非計算字符以增強安全性
                if (/^[0-9+\-*/. ]+$/.test(expression)) {
                    document.getElementById("display").value = eval(expression);
                } else {
                    document.getElementById("display").value = 'Error';
                }
            } catch (e) {
                document.getElementById("display").value = 'Error';
            }
        }
    </script>
</body>
</html>
